<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificates — Abdulrahman Alzahrani</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Space+Mono:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy: #0b3327;
    --navy-deep: #051d15;
    --ivory: #f3efe1;
    --ink: #14261e;
    --gold: #a9823c;
    --gold-soft: #d9bb6f;
    --line: rgba(20,38,30,0.14);
  }

  *{ box-sizing: border-box; }

  html, body{ margin: 0; padding: 0; min-height: 100%; }

  body{
    background:
      radial-gradient(circle at 20% 15%, rgba(201,162,39,0.08), transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(201,162,39,0.06), transparent 40%),
      var(--navy);
    background-color: var(--navy);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    padding: 48px 20px;
  }

  body::before{
    content: "";
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(
      115deg,
      rgba(217,187,111,0.05) 0px,
      rgba(217,187,111,0.05) 1px,
      transparent 1px,
      transparent 7px
    );
    pointer-events: none;
  }

  .badge{
    position: relative;
    width: 100%;
    max-width: 460px;
    background:
      repeating-linear-gradient(
        180deg,
        transparent 0px,
        transparent 27px,
        rgba(20,38,30,0.05) 27px,
        rgba(20,38,30,0.05) 28px
      ),
      var(--ivory);
    border-radius: 20px;
    padding: 40px 44px 36px;
    box-shadow:
      0 30px 60px -20px rgba(0,0,0,0.55),
      0 2px 0 rgba(255,255,255,0.35) inset;
    text-align: center;
    border: 1px solid rgba(169,130,60,0.25);
  }

  .topbar{
    display: flex;
    align-items: center;
    margin-bottom: 22px;
  }
  .back{
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--ink);
    text-decoration: none;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.04em;
  }
  .back:hover{ color: var(--gold); }

  .heading{
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 21px;
    color: var(--ink);
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }

  .subheading{
    font-family: 'Space Mono', monospace;
    font-size: 11.5px;
    color: rgba(27,35,55,0.5);
    margin: 0 0 28px;
  }

  .links{
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-stub{
    position: relative;
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--ink);
    color: var(--ivory);
    text-decoration: none;
    border-radius: 12px;
    padding: 13px 18px;
    font-family: 'Inter', sans-serif;
    font-size: 14.5px;
    font-weight: 500;
    text-align: left;
    transition: transform 0.16s ease, background 0.16s ease, box-shadow 0.16s ease;
    overflow: hidden;
  }

  .link-stub:hover,
  .link-stub:focus-visible{
    background: var(--navy-deep);
    transform: translateY(-2px);
    box-shadow: 0 10px 22px -10px rgba(0,0,0,0.5);
  }

  .link-stub:focus-visible{
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }

  .link-stub .icon{
    flex: 0 0 auto;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gold-soft);
  }
  .link-stub .icon svg{ width: 100%; height: 100%; }

  .link-stub .label{
    display: flex;
    flex-direction: column;
    line-height: 1.25;
  }
  .link-stub .label small{
    font-family: 'Space Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(246,243,236,0.5);
  }

  .link-stub::after{
    content: "";
    position: absolute;
    right: 46px;
    top: 6px;
    bottom: 6px;
    width: 1px;
    background-image: linear-gradient(rgba(246,243,236,0.28) 50%, transparent 0%);
    background-size: 1px 6px;
  }

  .link-stub .go{
    margin-left: auto;
    flex: 0 0 auto;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: rgba(246,243,236,0.5);
  }

  @media (prefers-reduced-motion: reduce){
    .link-stub{ transition: none; }
  }
</style>
</head>
<body>

  <main class="badge">
    <div class="topbar">
      <a class="back" href="index.html">← Back</a>
    </div>

    <h1 class="heading">Certificates</h1>
    <p class="subheading">Select a certificate to view</p>

    <nav class="links" aria-label="Certificate links">
      <a class="link-stub" href="viewer.html?file=Resources/Certificates/FMVA.pdf&name=FMVA%20Certificate">
        <span class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M8.5 13.5 7 22l5-3 5 3-1.5-8.5"/></svg>
        </span>
        <span class="label">
          <small>CFI</small>
          FMVA&reg; — Financial Modeling &amp; Valuation Analyst
        </span>
        <span class="go">→</span>
      </a

    </nav>
  </main>

</body>
</html>
