<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Document — Abdulrahman Alzahrani</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy: #0b3327;
    --navy-deep: #051d15;
    --ivory: #f3efe1;
    --ink: #14261e;
    --gold: #a9823c;
    --gold-soft: #d9bb6f;
  }
  *{ box-sizing: border-box; }
  html, body{ margin:0; padding:0; height:100%; }
  body{
    background: var(--navy);
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 20px;
    background: var(--ivory);
    border-bottom: 1px solid rgba(169,130,60,0.25);
  }
  .back{
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--ink);
    text-decoration: none;
    font-family: 'Space Mono', monospace;
    font-size: 12.5px;
    letter-spacing: 0.04em;
  }
  .back:hover{ color: var(--gold); }
  #doc-name{
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(27,35,55,0.55);
    display: none;
  }
  @media (min-width: 560px){ #doc-name{ display:inline; } }
  .download-btn{
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--ink);
    color: var(--ivory);
    text-decoration: none;
    border-radius: 10px;
    padding: 10px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    font-weight: 500;
    transition: transform 0.16s ease, background 0.16s ease;
  }
  .download-btn:hover{
    background: var(--navy-deep);
    transform: translateY(-1px);
  }
  .download-btn svg{ width:16px; height:16px; }
  .viewer-wrap{ flex: 1; }
  iframe{ width: 100%; height: 100%; border: none; background: var(--ivory); }
  .fallback{
    color: var(--ivory);
    text-align: center;
    padding: 40px 20px;
    font-size: 14px;
  }
  .fallback a{ color: var(--gold-soft); }
</style>
</head>
<body>
  <header>
    <a class="back" href="index.html">← Back</a>
    <span id="doc-name"></span>
    <a class="download-btn" id="download-link" download>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download
    </a>
  </header>
  <div class="viewer-wrap">
    <iframe id="pdf-frame" title="Document viewer"></iframe>
  </div>

  <script>
    // Reads ?file=Resources/CV.pdf&name=CV from the URL and loads it.
    const params = new URLSearchParams(window.location.search);
    const file = params.get('file') || '';
    const name = params.get('name') || 'Document';

    document.getElementById('page-title').textContent = name + ' — Abdulrahman Alzahrani';
    document.getElementById('doc-name').textContent = name;

    const frame = document.getElementById('pdf-frame');
    const downloadLink = document.getElementById('download-link');

    if (file) {
      frame.src = file;
      downloadLink.href = file;
      downloadLink.setAttribute('download', file.split('/').pop());
    }
  </script>
</body>
</html>
