<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>References — Abdulrahman Alzahrani</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Space+Mono:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy: #0b3327;
    --navy-deep: #051d15;
    --ivory: #f3efe1;
    --ink: #14261e;
    --gold: #a9823c;
    --gold-soft: #d9bb6f;
    --line: rgba(20,38,30,0.14);
  }
  *{ box-sizing: border-box; }
  html, body{ margin:0; padding:0; min-height:100%; }
  body{
    background: var(--navy);
    font-family: 'Inter', sans-serif;
    padding: 0 0 60px;
  }
  header{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 16px 24px;
    background: var(--ivory);
    border-bottom: 1px solid rgba(169,130,60,0.25);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .back{
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--ink);
    text-decoration: none;
    font-family: 'Space Mono', monospace;
    font-size: 12.5px;
    letter-spacing: 0.04em;
  }
  .back:hover{ color: var(--gold); }
  .page-heading{
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(27,35,55,0.55);
  }

  .list{
    max-width: 820px;
    margin: 32px auto 0;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .rec-card{
    background: var(--ivory);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(169,130,60,0.25);
    box-shadow: 0 20px 40px -18px rgba(0,0,0,0.5);
  }
  .rec-title{
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--ink);
    padding: 14px 20px;
    border-bottom: 1px solid var(--line);
  }
  .rec-frame{
    width: 100%;
    height: 640px;
    border: none;
    display: block;
    background: var(--ivory);
  }
</style>
</head>
<body>

  <header>
    <a class="back" href="index.html">← Back</a>
    <span class="page-heading">References</span>
  </header>

  <div class="list">
    <div class="rec-card">
      <div class="rec-title">Recommendation 1</div>
      <iframe class="rec-frame" src="Resources/References/Recommendation1.pdf" title="Recommendation 1"></iframe>
    </div>

    <div class="rec-card">
      <div class="rec-title">Recommendation 2</div>
      <iframe class="rec-frame" src="Resources/References/Recommendation2.pdf" title="Recommendation 2"></iframe>
    </div>

    <div class="rec-card">
      <div class="rec-title">Recommendation 3</div>
      <iframe class="rec-frame" src="Resources/References/Recommendation3.pdf" title="Recommendation 3"></iframe>
    </div>

    <div class="rec-card">
      <div class="rec-title">Recommendation 4</div>
      <iframe class="rec-frame" src="Resources/References/Recommendation4.pdf" title="Recommendation 4"></iframe>
    </div>

    <div class="rec-card">
      <div class="rec-title">Recommendation 5</div>
      <iframe class="rec-frame" src="Resources/References/Recommendation5.pdf" title="Recommendation 5"></iframe>
    </div>
  </div>

</body>
</html>
